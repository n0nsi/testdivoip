#!/bin/bash

################################################################################
# TESTDIVOIP - Example Configuration File
# Copy and modify this file for your specific deployment
################################################################################

# ═════════════════════════════════════════════════════════════════════════════
# CLIENT & SCENARIO INFORMATION
# ═════════════════════════════════════════════════════════════════════════════

export CLIENT_NAME="ACME Corporation"
export SCENARIO_NAME="Production Cloud Deployment"
export CLOUD_PROVIDER="AWS eu-central-1"

# Note: PABX IP should be the public IP of your cloud-hosted PBX
export PABX_IP="203.0.113.100"

# ═════════════════════════════════════════════════════════════════════════════
# OFFICE LOCATIONS
# ═════════════════════════════════════════════════════════════════════════════
# 
# Add one entry per office/remote location
# The tool will test connectivity from each location to the PABX and SIP trunks
#

declare -a OFFICE_NAMES=(
    "HQ - São Paulo"
    "Branch - Rio de Janeiro"
    "Branch - Belo Horizonte"
    "Remote - Home Office"
)

declare -a OFFICE_IPS=(
    "203.0.113.10"      # HQ office public IP
    "203.0.113.20"      # Rio branch
    "203.0.113.30"      # MG branch
    "203.0.113.40"      # Home office
)

# ═════════════════════════════════════════════════════════════════════════════
# SIP TRUNK CARRIERS
# ═════════════════════════════════════════════════════════════════════════════
#
# Add one entry per SIP trunk provider
# Primary and backup trunks should both be tested
#

declare -a TRUNK_NAMES=(
    "Carrier Primary - Telecom Brazil"
    "Carrier Backup - International Provider"
)

declare -a TRUNK_IPS=(
    "198.51.100.10"     # Primary SIP trunk
    "198.51.100.20"     # Backup SIP trunk
)

# ═════════════════════════════════════════════════════════════════════════════
# ADVANCED OPTIONS
# ═════════════════════════════════════════════════════════════════════════════

# Number of packets for MTR test (more = more accurate but slower)
# Range: 50-500 packets
# Default: 100 packets
export MTR_PACKETS=100

# Enable verbose output during testing
# Set to 1 for detailed progress information
# Set to 0 for minimal output
export VERBOSE=1

# Enable debug mode for troubleshooting
# Only use if you're experiencing issues
# Set to 1 to enable debug logging
# Set to 0 to disable (recommended for production)
export DEBUG=0

# ═════════════════════════════════════════════════════════════════════════════
# NOTES
# ═════════════════════════════════════════════════════════════════════════════
#
# 1. OFFICE_NAMES and OFFICE_IPS arrays MUST have same length
# 2. TRUNK_NAMES and TRUNK_IPS arrays MUST have same length
# 3. IPs should be public/routable addresses
# 4. All arrays can be empty if not needed (set to just "")
#
# Example with no offices:
#   declare -a OFFICE_NAMES=()
#   declare -a OFFICE_IPS=()
#
# ═════════════════════════════════════════════════════════════════════════════

